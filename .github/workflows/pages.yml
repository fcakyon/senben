name: Deploy project page to GitHub Pages

# Builds the senben.kim project page from docs/. Triggers on every push to main
# that touches docs/, plus manual runs from the Actions tab.
#
# Setup (one-time, in repo Settings -> Pages):
#   Source: GitHub Actions
#   Custom domain: senben.kim
#   Enforce HTTPS: yes (after the cert is issued)
#
# DNS (one-time, at your registrar / Cloudflare):
#   senben.kim apex CNAME -> fcakyon.github.io
#   Cloudflare proxy: OFF until GitHub issues the Lets Encrypt cert (DNS-only),
#   then can be flipped back to proxied.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "CNAME"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage docs as Pages artifact
        run: |
          mkdir -p _site
          cp -r docs/. _site/
          # CNAME at repo root maps to the apex domain. Pages also reads docs/CNAME if present.
          if [ -f CNAME ]; then cp CNAME _site/CNAME; fi
          ls -la _site

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
